{% extends "base.html" %}
{% block title %}Gallery{% endblock %}

{% block content %}

<style>
.gallery-card{
    background: linear-gradient(135deg,#fffdf8,#fff4d8);
    border: 2px solid #f2d28b;
    border-radius: 24px;
    padding: 18px;
    min-height: 420px;

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:
        0 8px 24px rgba(0,0,0,0.08),
        inset 0 0 20px rgba(255,215,120,0.15);

    transition: all 0.3s ease;
}

.gallery-card:hover{
    transform: translateY(-4px);
    box-shadow:
        0 12px 28px rgba(0,0,0,0.12),
        0 0 20px rgba(242,210,139,0.35);
}

.gallery-card img{
    width:100%;
    height:380px;
    object-fit:contain;
    object-position:center;
    border-radius:16px;
}

.gallery-heading{
    font-family:'Merienda';
    color:#7b150f;
    font-size:2.3rem;
    font-weight:700;
}
</style>

<div class="container my-5 text-center">

    <h2 class="gallery-heading">Gallery</h2>

    <div class="p-4 rounded-4 shadow mt-4"
         style="
            background:url('{{ url_for('static', filename='assets/hero-temple.jpg') }}') center/cover;
            border:3px solid #f2d28b;
         ">

        <div class="row g-4 mt-2">

            {% for i in range(1,7) %}
            <div class="col-md-6">

                <div class="gallery-card">

                    <img src="{{ url_for('static', filename='assets/priest' ~ i ~ '.jpeg') }}"
                         alt="Gallery Image {{ i }}">

                </div>

            </div>
            {% endfor %}

        </div>

    </div>

</div>

{% endblock %}
